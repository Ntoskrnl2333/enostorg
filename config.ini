[server]
# 监听地址
listen = 0.0.0.0
# 监听端口
port = 8080
# 客户端最大连接数（0=不限制）
max_connections = 0
# 请求超时（秒）
request_timeout = 30

[logging]
# 日志级别: trace, debug, info, warn, error, critical
level = info
# 日志输出文件（留空表示仅控制台输出）
file = enostorg.log
# 是否输出到控制台
console = true

[database]
# 数据库文件路径
path = storage.db
# 是否启用WAL模式
wal_mode = true
# 忙等待超时（毫秒），用于多线程并发访问
busy_timeout_ms = 5000

[storage]
# 数据块文件存放目录（相对于工作目录）
blocks_dir = blocks

[chunking]
# 分块策略: fixed（固定大小）, variable（内容定义）
strategy = variable
fixed_size = 262144
min_chunk_size = 65536
max_chunk_size = 1048576
rolling_hash_window = 48
rolling_hash_mask_bits = 12

[backup]
# 备份策略: none（不备份）| mirror（副本环）
strategy = mirror
# 每个主块的副本数（需要至少 replicas+1 个可用磁盘）
replicas = 1

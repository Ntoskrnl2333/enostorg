<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Enostorg — Network Storage</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#333}
h1{padding:16px 24px;background:#2c3e50;color:#fff;font-size:20px}
.layout{display:flex;gap:16px;padding:16px;max-width:1400px;margin:0 auto}
.panel{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);flex:1;padding:16px;min-width:0}
.panel h2{font-size:16px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #2c3e50}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-row input{flex:1;min-width:120px;padding:8px 10px;border:1px solid #ddd;border-radius:4px;font-size:14px}
.form-row input[type=number]{width:100px;flex:0 0 auto}
.btn{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-size:14px}
.btn-primary{background:#2c3e50;color:#fff}
.btn-danger{background:#e74c3c;color:#fff}
.btn-success{background:#27ae60;color:#fff}
.btn-warning{background:#f39c12;color:#fff}
.btn-small{padding:4px 10px;font-size:12px}
.btn:hover{opacity:.85}
table{width:100%;border-collapse:collapse;margin-top:8px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid #eee;font-size:13px}
th{background:#f8f8f8;font-weight:600}
tr:hover{background:#fafafa}
.monospace{font-family:"Cascadia Code","Consolas",monospace;font-size:12px;word-break:break-all}
.badge{padding:2px 8px;border-radius:10px;font-size:11px}
.badge-ok{background:#d4edda;color:#155724}
.badge-bad{background:#f8d7da;color:#721c24}
.msg{padding:8px 12px;border-radius:4px;margin-bottom:8px;font-size:14px;display:none}
.msg-success{background:#d4edda;color:#155724}
.msg-error{background:#f8d7da;color:#721c24}
</style></head>
<body>
<h1>Enostorg Network Storage</h1>
<div class="layout">
<div class="panel" style="flex:1">
<h2>Create File</h2>
<div class="msg" id="fmsg"></div>
<div class="form-row">
  <input id="ffpath" placeholder="/path/to/file">
  <input id="fsize" type="number" placeholder="Size (Bytes)" value="1024">
  <input id="fdesc" placeholder="Description">
</div>
<div class="form-row"><button class="btn btn-primary" onclick="createFile()">Create File</button></div>
<h2>Files</h2>
<div id="filelist"><table><tr><th>Path</th><th>Size</th><th>Description</th><th>Actions</th></tr></table></div>
</div>
<div class="panel" style="flex:1">
<h2>Create Block</h2>
<div class="msg" id="bmsg"></div>
<div class="form-row">
  <input id="bpath" placeholder="/blocks/001.bin">
  <input id="bsha" placeholder="SHA-256">
  <input id="bsize" type="number" placeholder="Size" value="4096">
</div>
<div class="form-row"><button class="btn btn-primary" onclick="createBlock()">Create Block</button></div>
<h2>Append Block to File</h2>
<div class="form-row">
  <input id="atarget" placeholder="File path">
  <input id="ablock" type="number" placeholder="Block ID">
  <button class="btn btn-success" onclick="appendBlock()">Append</button>
</div>
<h2>Blocks</h2>
<div class="form-row">
  <input id="blockfilter" placeholder="Filter by file path" style="flex:1">
  <button class="btn btn-primary" onclick="loadBlocks()">Load</button>
</div>
<div id="blocklist"><table><tr><th>ID</th><th>Path</th><th>Size</th><th>Status</th><th>SHA-256</th><th>Actions</th></tr></table></div>
</div>
</div>
<script src="/app.js"></script>
</body></html>
